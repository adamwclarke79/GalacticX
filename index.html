<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GalacticX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      align-items: center;
      background: #05070f;
      color: #eef4ff;
      display: flex;
      font-family: Consolas, Monaco, monospace;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 18px;
    }
    #game {
      display: grid;
      gap: 12px;
      max-width: 1066px;
      width: min(100%, 1066px);
    }
    .stage-wrap {
      aspect-ratio: 4 / 3;
      background: #090b16;
      border: 1px solid #2c3954;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      position: relative;
      width: 100%;
    }
    #stage {
      display: block;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 100%;
    }
    .loading {
      background: rgba(5, 7, 15, 0.86);
      color: #ffe81f;
      inset: 0;
      place-items: center;
      position: absolute;
    }
    .loading:not([hidden]) {
      display: grid;
    }
    .toolbar {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: center;
      min-height: 44px;
    }
    button {
      align-items: center;
      background: #24324a;
      border: 1px solid #7fa8d8;
      color: #ffffff;
      cursor: pointer;
      display: inline-flex;
      font: inherit;
      height: 40px;
      justify-content: center;
      width: 48px;
    }
    button:hover {
      background: #32476a;
    }
    .direction {
      color: #dce8ff;
      min-width: 170px;
      text-align: center;
    }
    @media (max-width: 620px) {
      body {
        padding: 8px;
      }
      .toolbar {
        font-size: 13px;
      }
      .direction {
        min-width: 135px;
      }
    }
  </style>
</head>
<body>
  <main id="game" aria-label="GalacticX animated character sprites">
    <section class="stage-wrap">
      <canvas id="stage" width="800" height="600"></canvas>
      <div class="loading" data-loading>Loading sprites...</div>
    </section>
    <nav class="toolbar" aria-label="Sprite direction controls">
      <button type="button" data-previous aria-label="Previous direction">&lt;</button>
      <div class="direction" data-direction>Facing south</div>
      <button type="button" data-next aria-label="Next direction">&gt;</button>
    </nav>
  </main>
  <script src="src/main.js"></script>
</body>
</html>
